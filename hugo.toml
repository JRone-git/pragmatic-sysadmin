baseURL = "https://pragmaticsysadmin.help/"
canonifyURLs = true
title = "Pragmatic Tech"
theme = "PaperMod"

[author]
  name = "Pragmatic Sysadmin"

[pagination]
  pagerSize = 10
enableRobotsTXT = true

# Sitemap priorities — tells search engines which pages matter most
[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Language settings
[languages]
  [languages.en]
    languageName = "English"
    label = "English"
    weight = 1

[params]
  description = "Practical sysadmin guides, senior tech help for aging parents, and kids' learning games — without the buzzwords. By Jonne, a Finnish sysadmin."
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowShareButtons = true
  # homeInfoParams removed — redundant with the custom homepage
  # (content/_index.md already has the hero). See layouts/_default/home.html
  # Author information — kept as 'Pragmatic Sysadmin' because that's
  # accurate for the author (Jonne is a sysadmin). The site brand is
  # 'Pragmatic Tech' but the author identity stays the same.
  author = "Pragmatic Sysadmin"
  
  # SEO & Social
  # NOTE: site-wide OG image is set in layouts/partials/extend_head.html
  # so per-post OG images take precedence. Do NOT set `images` here or
  # PaperMod's opengraph partial will emit a duplicate og:image tag.
  keywords = ["sysadmin", "devops", "kubernetes", "home lab", "zero trust", "automation", "system administration", "cloud computing", "senior tech", "family tech"]
  
  # OpenGraph/Twitter Cards
  twitterCards = true
  openGraph = true
  
  # Navigation
  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

