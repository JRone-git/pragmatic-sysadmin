baseURL = "https://pragmaticsysadmin.help/"
canonifyURLs = true
title = "Pragmatic Sysadmin"
theme = "PaperMod"

[pagination]
  pagerSize = 10
enableRobotsTXT = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Language settings
[languages]
  [languages.en]
    languageName = "English"
    weight = 1

[params]
  description = "Practical sysadmin tutorials and DevOps guides. Learn home lab setup, Kubernetes, zero trust security, and automation with hands-on examples for system administrators."
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowShareButtons = true
  # Disable home info which is causing the error
  homeInfoParams = false
  
  # Author information (FIX for RSS template error)
  author = "Pragmatic Sysadmin"
  
  # SEO & Social
  # NOTE: site-wide OG image is set in layouts/partials/extend_head.html
  # so per-post OG images take precedence. Do NOT set `images` here or
  # PaperMod's opengraph partial will emit a duplicate og:image tag.
  keywords = ["sysadmin", "devops", "kubernetes", "home lab", "zero trust", "automation", "system administration", "cloud computing", "senior tech", "family tech"]
  
  # OpenGraph/Twitter Cards
  twitterCards = true
  openGraph = true
  
  # Navigation
  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

