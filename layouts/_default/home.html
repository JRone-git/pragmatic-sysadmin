{{/*
  Homepage template override.
  Renders only .Content (the custom landing page) and the chat widget.
  home.html only applies to the homepage (/). Other sections use PaperMod's list.html.
*/}}
{{- define "main" }}
<main class="main" style="max-width:860px;margin:0 auto;padding:0 1rem;">
  {{- .Content }}
</main>
{{ partial "chat-widget.html" . }}
{{- end }}
